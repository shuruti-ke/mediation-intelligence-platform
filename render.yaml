# Mediation Intelligence Platform - Render Blueprint
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: mediation-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mediation-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: REDIS_URL
        sync: false

databases:
  - name: mediation-db
    databaseName: mediation_platform
    user: mediation
    plan: free
